<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 52" width="7000" height="160" preserveAspectRatio="none">
  <defs>
    <filter id="glow" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom" x="-60%" y="-300%" width="220%" height="700%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bloom2" x="-100%" y="-400%" width="300%" height="900%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!--
    Center x=1100, all clusters bunched much closer:
    Center diamond:        x=1100
    Left inner diamond:    x=1010   Right inner diamond:  x=1190
    Rhombus A (L of 1010): x=975    Rhombus D (R of 1190): x=1225
    Rhombus B (R of 1010): x=1045   Rhombus C (L of 1190): x=1155
    Left tick cluster:     x=880    Right tick cluster:    x=1320
    Line ends:             x=8 / x=2192
  -->

  <!-- === LINES === -->
  <line x1="8"    y1="26" x2="875"  y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.5"  filter="url(#glow)"/>
  <line x1="905"  y1="26" x2="961"  y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.65" filter="url(#glow)"/>
  <line x1="989"  y1="26" x2="996"  y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.75" filter="url(#glow)"/>
  <line x1="1024" y1="26" x2="1031" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.75" filter="url(#glow)"/>
  <line x1="1059" y1="26" x2="1064" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.8"  filter="url(#glow)"/>
  <line x1="1136" y1="26" x2="1141" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.8"  filter="url(#glow)"/>
  <line x1="1169" y1="26" x2="1176" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.75" filter="url(#glow)"/>
  <line x1="1204" y1="26" x2="1211" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.75" filter="url(#glow)"/>
  <line x1="1239" y1="26" x2="1295" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.65" filter="url(#glow)"/>
  <line x1="1325" y1="26" x2="2192" y2="26" stroke="#00FFFF" stroke-width="1" opacity="0.5"  filter="url(#glow)"/>

  <!-- === LEFT TICK CLUSTER (x 875–905) === -->
  <line x1="878"  y1="21" x2="878"  y2="31" stroke="#00FFFF" stroke-width="1"   opacity="0.35" filter="url(#glow)"/>
  <line x1="884"  y1="17" x2="884"  y2="35" stroke="#00FFFF" stroke-width="1.5" opacity="0.75" filter="url(#glow)"/>
  <line x1="890"  y1="20" x2="890"  y2="32" stroke="#00FFFF" stroke-width="1"   opacity="0.5"  filter="url(#glow)"/>
  <line x1="896"  y1="18" x2="896"  y2="34" stroke="#00FFFF" stroke-width="1.2" opacity="0.6"  filter="url(#glow)"/>
  <line x1="902"  y1="22" x2="902"  y2="30" stroke="#00FFFF" stroke-width="1"   opacity="0.35" filter="url(#glow)"/>

  <!-- === RIGHT TICK CLUSTER (x 1295–1325) === -->
  <line x1="1298" y1="22" x2="1298" y2="30" stroke="#00FFFF" stroke-width="1"   opacity="0.35" filter="url(#glow)"/>
  <line x1="1304" y1="18" x2="1304" y2="34" stroke="#00FFFF" stroke-width="1.2" opacity="0.6"  filter="url(#glow)"/>
  <line x1="1310" y1="20" x2="1310" y2="32" stroke="#00FFFF" stroke-width="1"   opacity="0.5"  filter="url(#glow)"/>
  <line x1="1316" y1="17" x2="1316" y2="35" stroke="#00FFFF" stroke-width="1.5" opacity="0.75" filter="url(#glow)"/>
  <line x1="1322" y1="21" x2="1322" y2="31" stroke="#00FFFF" stroke-width="1"   opacity="0.35" filter="url(#glow)"/>

  <!-- === RHOMBUS A — left of left inner diamond (cx=975) === -->
  <polygon points="961,26 975,19 989,26 975,33"
    fill="none" stroke="#00FFFF" stroke-width="1.1" opacity="0.7" filter="url(#glow)"/>
  <polygon points="961,26 975,19 989,26 975,33"
    fill="#00FFFF" opacity="0.1" filter="url(#bloom)"/>

  <!-- === LEFT INNER DIAMOND (cx=1010) === -->
  <polygon points="996,26 1010,18 1024,26 1010,34"
    fill="none" stroke="#00FFFF" stroke-width="1.2" opacity="0.85" filter="url(#glow)"/>
  <polygon points="996,26 1010,18 1024,26 1010,34"
    fill="#00FFFF" opacity="0.13" filter="url(#bloom)"/>
  <circle cx="1010" cy="26" r="1.8" fill="#00FFFF" filter="url(#glow)"/>

  <!-- === RHOMBUS B — right of left inner diamond (cx=1045) === -->
  <polygon points="1031,26 1045,19 1059,26 1045,33"
    fill="none" stroke="#00FFFF" stroke-width="1.1" opacity="0.7" filter="url(#glow)"/>
  <polygon points="1031,26 1045,19 1059,26 1045,33"
    fill="#00FFFF" opacity="0.1" filter="url(#bloom)"/>

  <!-- === CENTER DIAMOND (cx=1100) === -->
  <polygon points="1100,4 1140,26 1100,48 1060,26"
    fill="#00FFFF" opacity="0.07" filter="url(#bloom2)"/>
  <polygon points="1100,7 1136,26 1100,45 1064,26"
    fill="#00FFFF" opacity="0.1" filter="url(#bloom)"/>
  <polygon points="1100,7 1136,26 1100,45 1064,26"
    fill="none" stroke="#00FFFF" stroke-width="1.4" filter="url(#glow)"/>
  <polygon points="1100,14 1126,26 1100,38 1074,26"
    fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.5"/>
  <polygon points="1100,14 1126,26 1100,38 1074,26"
    fill="#00FFFF" opacity="0.14" filter="url(#bloom)"/>
  <circle cx="1100" cy="26" r="3.5" fill="#00FFFF" filter="url(#bloom2)"/>
  <circle cx="1100" cy="26" r="1.8" fill="#ffffff" opacity="0.9"/>

  <!-- === RHOMBUS C — left of right inner diamond (cx=1155) === -->
  <polygon points="1141,26 1155,19 1169,26 1155,33"
    fill="none" stroke="#00FFFF" stroke-width="1.1" opacity="0.7" filter="url(#glow)"/>
  <polygon points="1141,26 1155,19 1169,26 1155,33"
    fill="#00FFFF" opacity="0.1" filter="url(#bloom)"/>

  <!-- === RIGHT INNER DIAMOND (cx=1190) === -->
  <polygon points="1176,26 1190,18 1204,26 1190,34"
    fill="none" stroke="#00FFFF" stroke-width="1.2" opacity="0.85" filter="url(#glow)"/>
  <polygon points="1176,26 1190,18 1204,26 1190,34"
    fill="#00FFFF" opacity="0.13" filter="url(#bloom)"/>
  <circle cx="1190" cy="26" r="1.8" fill="#00FFFF" filter="url(#glow)"/>

  <!-- === RHOMBUS D — right of right inner diamond (cx=1225) === -->
  <polygon points="1211,26 1225,19 1239,26 1225,33"
    fill="none" stroke="#00FFFF" stroke-width="1.1" opacity="0.7" filter="url(#glow)"/>
  <polygon points="1211,26 1225,19 1239,26 1225,33"
    fill="#00FFFF" opacity="0.1" filter="url(#bloom)"/>

</svg>
